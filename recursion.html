<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>قسم العودية</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />

    <link rel="stylesheet" href="css/recursion.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <a href="index.html" class="navbar-brand">
          <i class="fa-solid fa-arrow-right"></i>
          العودة للرئيسية
        </a>
      </div>
    </nav>
    <div class="container py-5">
      <h1 class="text-center page-title mb-4">الخوارزميات العودية</h1>

      <div class="control-panel">
        <div class="row g-3">
          <div class="col-md-4">
            <select id="algorithmSelect" class="form-select">
              <option value="fib">سلسلة فيبوناتشي</option>
              <option value="gcd">خوارزمية إقليدس</option>
              <option value="hanoi">أبراج هانوي</option>
            </select>
          </div>

          <div class="col-md-4">
            <input
              id="input1"
              type="number"
              class="form-control"
              placeholder="القيمة الأولى"
            />
          </div>

          <div class="col-md-4">
            <input
              id="input2"
              type="number"
              class="form-control"
              placeholder="القيمة الثانية (للـ GCD)"
            />
          </div>
        </div>

        <div class="mt-3">
          <button onclick="runAlgorithm()" class="btn btn-success">
            <i class="fa-solid fa-play"></i>
            تنفيذ
          </button>

          <button onclick="resetPage()" class="btn btn-danger">
            <i class="fa-solid fa-rotate"></i>
            إعادة ضبط
          </button>
        </div>
      </div>

      <div class="row">
        <div class="col-lg-8">
          <div class="visual-box">
            <h4 class="mb-4">منطقة العرض</h4>

            <div id="visualArea"></div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="log-box">
            <h4 class="mb-3">شرح التنفيذ</h4>

            <div id="logArea"></div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="js/recursion.js"></script>
  </body>
</html>
