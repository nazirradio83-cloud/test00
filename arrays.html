<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>قسم المصفوفات</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/arrays.css" />
  </head>

  <body>
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <a href="index.html" class="navbar-brand">
          <i class="fa-solid fa-arrow-right"></i>
          العودة للرئيسية
        </a>
      </div>
    </nav>

    <div class="container py-5">
      <h1 class="text-center mb-5">خوارزميات المصفوفات</h1>

      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-4">
              <input
                id="valueInput"
                type="number"
                class="form-control w-75 mx-auto"
                placeholder="القيمة"
              />
            </div>

            <div class="col">
              <input
                id="indexInput"
                type="number"
                class="form-control w-75 mx-auto"
                placeholder="الفهرس"
                width="100"
              />
            </div>

            <div class="col-md-4">
              <button
                onclick="resetArray()"
                class="btn bg-dark bg-gradient w-50 mx-auto d-block text-white"
              >
                إعادة ضبط
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-2 mb-4">
        <div class="col">
          <button
            class="btn btn-success bg-gradient w-100"
            onclick="insertFirst()"
          >
            ➕ إضافة للبداية
          </button>
        </div>

        <div class="col">
          <button
            class="btn btn-success bg-gradient w-100"
            onclick="insertMiddle()"
          >
            ➕ إضافة للوسط
          </button>
        </div>

        <div class="col">
          <button
            class="btn btn-success bg-gradient w-100"
            onclick="insertLast()"
          >
            ➕ إضافة للنهاية
          </button>
        </div>
      </div>

      <div class="row g-2 mb-4 flex justify-content-center align-items-center">
        <div class="col">
          <button
            style="width: 90%"
            class="btn btn-danger bg-gradient"
            onclick="deleteFirst()"
          >
            حذف من البداية
          </button>
        </div>

        <div class="col">
          <button
            style="width: 90%"
            class="btn btn-danger bg-gradient"
            onclick="deleteMiddle()"
          >
            حذف من الوسط
          </button>
        </div>

        <div class="col">
          <button
            style="width: 90%"
            class="btn btn-danger bg-gradient"
            onclick="deleteLast()"
          >
            حذف من النهاية
          </button>
        </div>
      </div>

      <div class="row g-2 mb-4">
        <div class="col">
          <button
            style="width: 50%"
            class="btn bg-warning bg-gradient"
            onclick="linearSearch()"
          >
            البحث الخطي
          </button>
        </div>

        <div class="col">
          <button
            style="width: 50%"
            class="btn btn-info bg-gradient"
            onclick="binarySearch()"
          >
            البحث الثنائي
          </button>
        </div>
      </div>

      <div class="row">
        <div class="col-lg-8">
          <div class="visual-box">
            <h4>المصفوفة</h4>

            <div id="arrayContainer" class="array-container"></div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="log-box">
            <h4>شرح التنفيذ</h4>

            <div id="logArea"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/arrays.js"></script>
  </body>
</html>
