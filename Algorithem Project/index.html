<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي الخوارزميات</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            color: white;
            font-family: Tahoma, sans-serif;
           overflow: hidden;
        }

        .hero {
            padding: 100px 0;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: bold;
        }

        .hero p {
            color: #cbd5e1;
            max-width: 700px;
            margin: auto;
        }

        .algorithm-card {
            background: rgba(255,255,255,.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            transition: .4s;
            border: 1px solid rgba(255,255,255,.1);
            height: 100%;
        }

        .algorithm-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,.3);
        }

        .icon-box {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(255,255,255,.1);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
            font-size: 35px;
        }

        .btn-enter {
            border-radius: 50px;
            padding: 10px 30px;
        }

        footer {
            color: #94a3b8;
            margin-top: 100px;
        }

        .feature {
            background: rgba(255,255,255,.05);
            border-radius: 15px;
            padding: 20px;
        }
        .container{
           margin-top: 10em;
        }
    </style>
</head>

<body>
    <section class="container mt-5 ">

        <div class="row g-4">

            <!-- Recursion -->

            <div class="col-lg-4" data-aos="zoom-in">

                <div class="algorithm-card p-4 text-center">

                    <div class="icon-box mb-4">
                        <i class="fa-solid fa-repeat"></i>
                    </div>

                    <h3>
                        الخوارزميات العودية
                    </h3>

                    <p class="text-light mt-3">

                        سلسلة فيبوناتشي
                        <br>
                        خوارزمية إقليدس
                        <br>
                        أبراج هانوي

                    </p>

                    <a href="recursion.html"
                        class="btn btn-primary btn-enter mt-3">

                        دخول الصفحة

                    </a>

                </div>

            </div>

            <!-- Arrays -->

            <div class="col-lg-4" data-aos="zoom-in" data-aos-delay="200">

                <div class="algorithm-card p-4 text-center">

                    <div class="icon-box mb-4">
                        <i class="fa-solid fa-table-cells"></i>
                    </div>

                    <h3>
                        خوارزميات المصفوفات
                    </h3>

                    <p class="text-light mt-3">

                        الإضافة
                        <br>
                        الحذف
                        <br>
                        البحث الخطي والثنائي

                    </p>

                    <a href="arrays.html"
                        class="btn btn-success btn-enter mt-3">

                        دخول الصفحة

                    </a>

                </div>

            </div>

            <!-- Sorting -->

            <div class="col-lg-4" data-aos="zoom-in" data-aos-delay="400">

                <div class="algorithm-card p-4 text-center">

                    <div class="icon-box mb-4">
                        <i class="fa-solid fa-arrow-down-wide-short"></i>
                    </div>

                    <h3>
                        خوارزميات الترتيب
                    </h3>

                    <p class="text-light mt-3">

                        Bubble Sort
                        <br>
                        Selection Sort
                        <br>
                        Merge & Quick Sort

                    </p>

                    <a href="sorting.html"
                        class="btn btn-warning btn-enter mt-3">

                        دخول الصفحة

                    </a>

                </div>

            </div>

        </div>

    </section>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- AOS -->

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>

</body>

</html>
