<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الخوارزميات العودية</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7fb;
        }

        .page-title{
            font-weight:bold;
        }

        .visual-box{
            min-height:400px;
            background:white;
            border-radius:15px;
            padding:25px;
            box-shadow:0 0 15px rgba(0,0,0,.08);
        }

        .log-box{
            min-height:400px;
            background:white;
            border-radius:15px;
            padding:20px;
            box-shadow:0 0 15px rgba(0,0,0,.08);
            overflow:auto;
        }

        .step-item{
            background:#0d6efd;
            color:white;
            padding:10px;
            margin-bottom:10px;
            border-radius:10px;
            animation:fadeIn .5s;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(15px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .tower-container{
            display:flex;
            justify-content:space-around;
            align-items:flex-end;
            height:280px;
            margin-top:20px;
        }

        .tower{
            width:30%;
            height:250px;
            border-bottom:5px solid #222;
            position:relative;
            display:flex;
            flex-direction:column-reverse;
            align-items:center;
        }

        .tower::before{
            content:'';
            position:absolute;
            width:6px;
            height:220px;
            background:#444;
            bottom:0;
        }

        .disk{
            height:28px;
            border-radius:8px;
            margin-bottom:5px;
            color:white;
            text-align:center;
            line-height:28px;
            font-size:13px;
        }

        .fib-node{
            background:#198754;
            color:white;
            display:inline-block;
            padding:10px 15px;
            border-radius:10px;
            margin:5px;
        }

        .gcd-box{
            background:#ffc107;
            padding:15px;
            border-radius:10px;
            margin:10px 0;
            font-weight:bold;
        }

        .control-panel{
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,.08);
            margin-bottom:20px;
        }

        .algorithm-description{
            background:#eef6ff;
            border-right:5px solid #0d6efd;
            padding:15px;
            border-radius:10px;
            margin-top:15px;
        }
        .disk{
    transition:
    transform 0.8s ease,
    left 0.8s ease,
    top 0.8s ease;
}

.tower{
    transition:all .5s;
}

.disk{

    box-shadow:
    0 4px 10px rgba(0,0,0,.2);

    transition:
    transform .8s ease;
}

.disk:hover{

    transform:scale(1.05);

}
.text-container{
    display:flex;
    justify-content:space-around;
    font-weight:bold;
    font-size:18px;
}
    </style>
</head>

<body>

<nav class="navbar ">
    <div class="container">
        <a href="index.html" class="navbar-brand bg-primary text-white px-3 py-2 rounded-pill">
            <i class="fa-solid fa-arrow-right"></i>
            العودة للرئيسية
        </a>
    </div>
</nav>

<div class="container py-5">

    <h1 class="text-center page-title mb-4">
        الخوارزميات العودية
    </h1>

    <div class="control-panel">

        <div class="row g-3">

            <div class="col-md-4">
                <select id="algorithmSelect" class="form-select">
                    <option value="fib">سلسلة فيبوناتشي</option>
                    <option value="gcd">خوارزمية إقليدس</option>
                    <option value="hanoi">أبراج هانوي</option>
                </select>
            </div>

            <div class="col-md-4">
                <input id="input1" type="number"
                    class="form-control"
                    placeholder="القيمة الأولى">
            </div>

            <div class="col-md-4">
                <input id="input2" type="number"
                    class="form-control"
                    placeholder="القيمة الثانية (للـ GCD)">
            </div>

        </div>

        <div class="mt-3">

            <button onclick="runAlgorithm()"
                class="btn btn-success">

                <i class="fa-solid fa-play"></i>
                تنفيذ

            </button>

            <button onclick="resetPage()"
                class="btn btn-danger">

                <i class="fa-solid fa-rotate"></i>
                إعادة ضبط

            </button>

        </div>

    </div>

    <div class="row">

        <div class="col-lg-8">

            <div class="visual-box">

                <h4 class="mb-4">
                    منطقة العرض
                </h4>

                <div id="visualArea"></div>

            </div>

        </div>

        <div class="col-lg-4">

            <div class="log-box">

                <h4 class="mb-3">
                    شرح التنفيذ
                </h4>

                <div id="logArea"></div>

            </div>

        </div>

    </div>

</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init();

const visualArea = document.getElementById("visualArea");
const logArea = document.getElementById("logArea");

function addLog(text){

    const div=document.createElement("div");

    div.className="step-item";
    div.innerHTML=text;

    logArea.appendChild(div);
}

function resetPage(){

    visualArea.innerHTML="";
    logArea.innerHTML="";
}

function runAlgorithm(){

    resetPage();

    const type=
        document.getElementById("algorithmSelect").value;

    if(type==="fib"){
        runFibonacci();
    }

    if(type==="gcd"){
        runGCD();
    }

    if(type==="hanoi"){
        runHanoi();
    }
}

function runFibonacci(){

    let n = parseInt(
        document.getElementById("input1").value
    );

    if(isNaN(n)) n = 6;

    let sequence = [];

    function fib(num){

        if(num <= 1) return num;

        return fib(num-1) + fib(num-2);
    }

    addLog("بدء تنفيذ خوارزمية فيبوناتشي");

    for(let i=0;i<=n;i++){

        setTimeout(()=>{

            let value = fib(i);

            sequence.push(value);

            let node = document.createElement("div");

            node.className = "fib-node";

            node.innerHTML =
            `Fib(${i}) = ${value}`;

            visualArea.appendChild(node);

            addLog(
                `تم حساب Fib(${i}) = ${value}`
            );

            if(i === n){

                let result = document.createElement("div");

                result.className =
                "alert alert-success mt-4";

                result.innerHTML =
                `
                <h5>
                الناتج النهائي
                </h5>

                <strong>
                ${sequence.join(" , ")}
                </strong>
                `;

                visualArea.appendChild(result);

                addLog(
                    "اكتمل إنشاء سلسلة فيبوناتشي"
                );
            }

        }, i * 700);

    }

}
function runGCD(){

    let a = parseInt(input1.value);
    let b = parseInt(input2.value);

    if(isNaN(a)) a = 252;
    if(isNaN(b)) b = 105;

    let step = 0;

    while(b !== 0){

        let remainder = a % b;

        const currentA = a;
        const currentB = b;
        const currentR = remainder;

        setTimeout(()=>{

            let box =
            document.createElement("div");

            box.className="gcd-box";

            box.innerHTML=
            `
            <div class="equation">
                ${currentA} % ${currentB} = ${currentR}
            </div>
            `;

            visualArea.appendChild(box);

        }, step * 1000);

        addLog(
            `
            <span dir="ltr">
            ${currentA} % ${currentB} = ${currentR}
            </span>
            `
        );

        a = b;
        b = remainder;

        step++;
    }

    setTimeout(()=>{

        addLog(
        `
        <strong>
        GCD = ${a}
        </strong>
        `
        );

    }, step * 1000);
}
function runHanoi(){

    let disks = parseInt(
        document.getElementById("input1").value
    );

    if(isNaN(disks))
        disks = 4;

    visualArea.innerHTML =

    `
    <div class="tower-container">

        <div class="tower" id="towerA"></div>

        <div class="tower" id="towerB"></div>

        <div class="tower" id="towerC"></div>

    </div>
    <div class="text-container mt-3">
        <div>A</div>
        <div>B</div>
        <div>C</div>
        </div>
    `;

    const towers = {
        A: document.getElementById("towerA"),
        B: document.getElementById("towerB"),
        C: document.getElementById("towerC")
    };

    let state = {
        A: [],
        B: [],
        C: []
    };

    for(let i=disks;i>=1;i--){

        let disk = document.createElement("div");

        disk.className = "disk";

        disk.style.width =
        (40 + i*25) + "px";

        disk.style.background =
        `hsl(${i*60},70%,50%)`;

        disk.innerHTML = i;

        towers.A.appendChild(disk);

        state.A.push(disk);
    }

    let moves = [];

    function hanoi(n,from,to,aux){

        if(n===1){

            moves.push({
                from,
                to
            });

            return;
        }

        hanoi(
            n-1,
            from,
            aux,
            to
        );

        moves.push({
            from,
            to
        });

        hanoi(
            n-1,
            aux,
            to,
            from
        );
    }

    hanoi(
        disks,
        "A",
        "C",
        "B"
    );

    moves.forEach((move,index)=>{

        setTimeout(()=>{

            let disk =
            state[move.from].pop();

            state[move.to].push(disk);

            towers[move.to]
            .appendChild(disk);

            addLog(

                `نقل القرص ${disk.innerHTML}
                من البرج ${move.from}
                إلى البرج ${move.to}`

            );

        },index*1200);

    });

}
</script>

</body>
</html>
